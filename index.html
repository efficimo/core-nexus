<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Core Nexus</title>
  </head>
  <style>
    :root {
      --neon-blue: #00e5ff;
      --neon-green: #00ff9c;
      --bg-dark: rgba(10, 20, 30, 0.75);
      --border-glow: rgba(0, 229, 255, 0.3);
      --text-primary: #e6faff;
    }

    /* Container principal */
    .core-box {
      position: relative;
      padding: 24px;
      border-radius: 12px;
      background: var(--bg-dark);
      backdrop-filter: blur(12px);
      color: var(--text-primary);
      overflow: hidden;

      border: 1px solid var(--border-glow);

      transition: all 0.3s ease;
    }

    /* Effet glow subtil */
    .core-box::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 12px;
      padding: 1px;
      background: linear-gradient(
              120deg,
              transparent,
              var(--neon-blue),
              var(--neon-green),
              transparent
      );
      -webkit-mask:
              linear-gradient(#000 0 0) content-box,
              linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.4;
    }

    /* Hover effect */
    .core-box:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow:
              0 0 20px rgba(0, 229, 255, 0.2),
              0 0 40px rgba(0, 255, 156, 0.1);
      border-color: var(--neon-blue);
    }

    /* Animation glow très lente */
    .core-box::after {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 12px;
      background: linear-gradient(
              90deg,
              transparent,
              rgba(0,229,255,0.3),
              rgba(0,255,156,0.3),
              transparent
      );
      opacity: 0;
      animation: corePulse 6s linear infinite;
    }

    @keyframes corePulse {
      0% { opacity: 0; transform: translateX(-100%); }
      50% { opacity: 0.2; }
      100% { opacity: 0; transform: translateX(100%); }
    }

    /* Titres */
    .core-box h2 {
      margin-bottom: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--neon-blue);
    }

    /* Texte */
    .core-box p {
      opacity: 0.85;
      line-height: 1.6;
    }
    </style>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
