<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 470" width="560" height="470">

  <!-- Fond -->
  <rect width="560" height="470" fill="#0a0e1a"/>

  <!-- Titre -->
  <text x="280" y="28" fill="#e2e8f0" font-size="14" font-family="monospace" text-anchor="middle" font-weight="bold">Grille de référence — Icônes hexagonales</text>
  <text x="280" y="48" fill="#64748b" font-size="10" font-family="monospace" text-anchor="middle">viewBox 0 0 20 20  ·  centre (10,10)  ·  R = 7.5  ·  R/2 = 3.75</text>

  <!-- Lignes guides (axes M-M) -->
  <!-- M1(364,260)→M4(156,260) horizontal -->
  <line x1="364" y1="260" x2="156" y2="260" stroke="#ffffff" opacity="0.05" stroke-width="1"/>
  <!-- M0(312,170)→M3(208,350) diagonal -->
  <line x1="312" y1="170" x2="208" y2="350" stroke="#ffffff" opacity="0.05" stroke-width="1"/>
  <!-- M2(312,350)→M5(208,170) diagonal -->
  <line x1="312" y1="350" x2="208" y2="170" stroke="#ffffff" opacity="0.05" stroke-width="1"/>

  <!-- Hexagone extérieur — V0 V1 V2 V3 V4 V5 -->
  <polygon points="260,140 364,200 364,320 260,380 156,320 156,200"
    stroke="#3b82f6" stroke-opacity="0.35" fill="none"
    stroke-dasharray="6 3" stroke-width="1.5"/>

  <!-- Hexagone intérieur — I0 I1 I2 I3 I4 I5 -->
  <polygon points="260,200 312,230 312,290 260,320 208,290 208,230"
    stroke="#06b6d4" stroke-opacity="0.35" fill="none"
    stroke-dasharray="4 2.5" stroke-width="1"/>

  <!-- ─────────────────────────────────────────── -->
  <!-- POINTS                                      -->
  <!-- ─────────────────────────────────────────── -->

  <!-- C (260,260) — centre -->
  <circle cx="260" cy="260" r="7" fill="#ef4444"/>
  <text x="275" y="257" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold">C</text>
  <text x="275" y="268" fill="#64748b" font-size="7.5" font-family="monospace">(10,10)</text>

  <!-- V0 (260,140) — sommet top -->
  <circle cx="260" cy="140" r="5" fill="#3b82f6"/>
  <text x="260" y="127" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle">V0</text>
  <text x="260" y="137" fill="#64748b" font-size="7.5" font-family="monospace" text-anchor="middle">(10,2.5)</text>

  <!-- V1 (364,200) — sommet top-right -->
  <circle cx="364" cy="200" r="5" fill="#3b82f6"/>
  <text x="374" y="197" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold">V1</text>
  <text x="374" y="207" fill="#64748b" font-size="7.5" font-family="monospace">(16.5,6.25)</text>

  <!-- V2 (364,320) — sommet bottom-right -->
  <circle cx="364" cy="320" r="5" fill="#3b82f6"/>
  <text x="374" y="317" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold">V2</text>
  <text x="374" y="327" fill="#64748b" font-size="7.5" font-family="monospace">(16.5,13.75)</text>

  <!-- V3 (260,380) — sommet bottom -->
  <circle cx="260" cy="380" r="5" fill="#3b82f6"/>
  <text x="260" y="396" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold" text-anchor="middle">V3</text>
  <text x="260" y="406" fill="#64748b" font-size="7.5" font-family="monospace" text-anchor="middle">(10,17.5)</text>

  <!-- V4 (156,320) — sommet bottom-left -->
  <circle cx="156" cy="320" r="5" fill="#3b82f6"/>
  <text x="146" y="317" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold" text-anchor="end">V4</text>
  <text x="146" y="327" fill="#64748b" font-size="7.5" font-family="monospace" text-anchor="end">(3.5,13.75)</text>

  <!-- V5 (156,200) — sommet top-left -->
  <circle cx="156" cy="200" r="5" fill="#3b82f6"/>
  <text x="146" y="197" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold" text-anchor="end">V5</text>
  <text x="146" y="207" fill="#64748b" font-size="7.5" font-family="monospace" text-anchor="end">(3.5,6.25)</text>

  <!-- M0 (312,170) — milieu V0-V1 -->
  <circle cx="312" cy="170" r="4.5" fill="#f97316"/>
  <text x="320" y="160" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold">M0</text>
  <text x="320" y="170" fill="#64748b" font-size="7.5" font-family="monospace">(13.25,4.375)</text>

  <!-- M1 (364,260) — milieu V1-V2 (côté droit) -->
  <circle cx="364" cy="260" r="4.5" fill="#f97316"/>
  <text x="374" y="257" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold">M1</text>
  <text x="374" y="267" fill="#64748b" font-size="7.5" font-family="monospace">(16.5,10)</text>

  <!-- M2 (312,350) — milieu V2-V3 -->
  <circle cx="312" cy="350" r="4.5" fill="#f97316"/>
  <text x="320" y="362" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold">M2</text>
  <text x="320" y="372" fill="#64748b" font-size="7.5" font-family="monospace">(13.25,15.625)</text>

  <!-- M3 (208,350) — milieu V3-V4 -->
  <circle cx="208" cy="350" r="4.5" fill="#f97316"/>
  <text x="200" y="362" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold" text-anchor="end">M3</text>
  <text x="200" y="372" fill="#64748b" font-size="7.5" font-family="monospace" text-anchor="end">(6.75,15.625)</text>

  <!-- M4 (156,260) — milieu V4-V5 (côté gauche) -->
  <circle cx="156" cy="260" r="4.5" fill="#f97316"/>
  <text x="146" y="257" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold" text-anchor="end">M4</text>
  <text x="146" y="267" fill="#64748b" font-size="7.5" font-family="monospace" text-anchor="end">(3.5,10)</text>

  <!-- M5 (208,170) — milieu V5-V0 -->
  <circle cx="208" cy="170" r="4.5" fill="#f97316"/>
  <text x="200" y="160" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold" text-anchor="end">M5</text>
  <text x="200" y="170" fill="#64748b" font-size="7.5" font-family="monospace" text-anchor="end">(6.75,4.375)</text>

  <!-- I0 (260,200) — inner top -->
  <circle cx="260" cy="200" r="4.5" fill="#06b6d4"/>
  <text x="268" y="195" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold">I0</text>
  <text x="268" y="205" fill="#64748b" font-size="7.5" font-family="monospace">(10,6.25)</text>

  <!-- I1 (312,230) — inner top-right -->
  <circle cx="312" cy="230" r="4.5" fill="#06b6d4"/>
  <text x="320" y="225" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold">I1</text>
  <text x="320" y="235" fill="#64748b" font-size="7.5" font-family="monospace">(13.25,8.125)</text>

  <!-- I2 (312,290) — inner bottom-right -->
  <circle cx="312" cy="290" r="4.5" fill="#06b6d4"/>
  <text x="320" y="285" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold">I2</text>
  <text x="320" y="295" fill="#64748b" font-size="7.5" font-family="monospace">(13.25,11.875)</text>

  <!-- I3 (260,320) — inner bottom -->
  <circle cx="260" cy="320" r="4.5" fill="#06b6d4"/>
  <text x="268" y="330" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold">I3</text>
  <text x="268" y="340" fill="#64748b" font-size="7.5" font-family="monospace">(10,13.75)</text>

  <!-- I4 (208,290) — inner bottom-left -->
  <circle cx="208" cy="290" r="4.5" fill="#06b6d4"/>
  <text x="200" y="285" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold" text-anchor="end">I4</text>
  <text x="200" y="295" fill="#64748b" font-size="7.5" font-family="monospace" text-anchor="end">(6.75,11.875)</text>

  <!-- I5 (208,230) — inner top-left -->
  <circle cx="208" cy="230" r="4.5" fill="#06b6d4"/>
  <text x="200" y="225" fill="#f1f5f9" font-size="9" font-family="monospace" font-weight="bold" text-anchor="end">I5</text>
  <text x="200" y="235" fill="#64748b" font-size="7.5" font-family="monospace" text-anchor="end">(6.75,8.125)</text>

  <!-- ─────────────────────────────────────────── -->
  <!-- LÉGENDE                                     -->
  <!-- ─────────────────────────────────────────── -->
  <circle cx="196" cy="420" r="5" fill="#ef4444"/>
  <text x="208" y="424" fill="#e2e8f0" font-size="10" font-family="monospace">C — centre</text>

  <circle cx="196" cy="436" r="5" fill="#3b82f6"/>
  <text x="208" y="440" fill="#e2e8f0" font-size="10" font-family="monospace">V0–V5 — sommets extérieurs (R = 7.5)</text>

  <circle cx="196" cy="452" r="5" fill="#f97316"/>
  <text x="208" y="456" fill="#e2e8f0" font-size="10" font-family="monospace">M0–M5 — milieux des côtés</text>

  <circle cx="196" cy="468" r="5" fill="#06b6d4"/>
  <text x="208" y="472" fill="#e2e8f0" font-size="10" font-family="monospace">I0–I5 — sommets intérieurs (R / 2 = 3.75)</text>

</svg>