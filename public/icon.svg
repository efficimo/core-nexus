<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="coreGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#4488ff"/>
      <stop offset="100%" stop-color="#1a3d9e"/>
    </radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#07090d"/>

  <!-- Ring 1 : accent, opacity 0.5 -->
  <circle cx="256" cy="256" r="204"
    fill="none" stroke="#2e6aff" stroke-width="7" stroke-opacity="0.5"
    stroke-dasharray="25 15" stroke-linecap="round"/>

  <!-- Ring 2 : connected green, opacity 0.4 -->
  <circle cx="256" cy="256" r="144"
    fill="none" stroke="#00e676" stroke-width="5" stroke-opacity="0.4"
    stroke-dasharray="18 12" stroke-linecap="round"/>

  <!-- Ring 3 : accent, opacity 0.35 -->
  <circle cx="256" cy="256" r="93"
    fill="none" stroke="#2e6aff" stroke-width="5" stroke-opacity="0.35"
    stroke-dasharray="12 10" stroke-linecap="round"/>

  <!-- Core outer halo -->
  <circle cx="256" cy="256" r="46"
    fill="#2e6aff" fill-opacity="0.08"
    stroke="#2e6aff" stroke-opacity="0.3" stroke-width="5"/>

  <!-- Core avec glow -->
  <circle cx="256" cy="256" r="46"
    fill="url(#coreGrad)" filter="url(#glow)"/>
</svg>