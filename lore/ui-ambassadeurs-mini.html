<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Core Nexus — Ambassadeurs (widget)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }

:root {
  --bg:        #05070b;
  --surface:   #0a0f18;
  --surface-2: #0d1420;
  --border:    #161f35;
  --border-hi: #1f2e4d;
  --text:      #b8c4d8;
  --text-dim:  #354560;
  --text-faint:#1a2540;
  --accent:    #2e6aff;
  --connected: #00e676;
  --error:     #ff2055;
  --warn:      #ffab00;
  --font-ui:   'Share Tech Mono', monospace;
  --font-h:    'Orbitron', sans-serif;
  --topbar-h:  48px;
}

body { background:var(--bg); font-family:var(--font-ui); color:var(--text); font-size:12px; }

body::after {
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px);
  pointer-events:none; z-index:9999;
}

/* ── LAYOUT ── */
.app { display:grid; grid-template-rows:var(--topbar-h) 1fr; height:100vh; }

/* ── TOPBAR (identique aux autres UIs) ── */
.topbar {
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 1rem; gap:.75rem; z-index:100;
}

.brand-orb { position:relative; width:24px; height:24px; flex-shrink:0; }
.brand-orb .r { position:absolute; border-radius:50%; border-style:dashed; }
.brand-orb .r1 { inset:0; border-width:1.5px; border-color:var(--accent); opacity:.6; animation:spin-cw 6s linear infinite; }
.brand-orb .r2 { inset:6px; border-width:1px; border-color:var(--connected); opacity:.4; animation:spin-ccw 9s linear infinite; }
.brand-orb .core { position:absolute; inset:10px; border-radius:50%; background:var(--accent); opacity:.7; }

.top-title { font-family:var(--font-h); font-size:.6rem; font-weight:900; letter-spacing:.12em; text-transform:uppercase; }
.top-sep { width:1px; height:20px; background:var(--border); margin:0 .25rem; }
.top-tag {
  padding:.12rem .45rem; font-size:.48rem; letter-spacing:.15em;
  border:1px solid rgba(46,106,255,.3); background:rgba(46,106,255,.08); color:var(--accent);
  clip-path:polygon(0 0,calc(100% - 4px) 0,100% 4px,100% 100%,4px 100%,0 calc(100% - 4px));
}

.top-right { display:flex; align-items:center; gap:.75rem; margin-left:auto; }
.top-stat { font-size:.52rem; color:var(--text-dim); letter-spacing:.08em; display:flex; align-items:center; gap:.3rem; }
.top-dot { width:5px; height:5px; border-radius:50%; background:var(--connected); box-shadow:0 0 5px var(--connected); animation:pulse-dot 2s ease-in-out infinite; }

/* ── MAIN ── */
.main {
  position:relative; overflow:hidden;
  background:var(--bg);
  /* Hex subtle bg */
  background-image:
    radial-gradient(ellipse 50% 60% at 30% 50%, rgba(46,106,255,.03) 0%, transparent 70%),
    radial-gradient(ellipse 40% 50% at 70% 50%, rgba(0,230,118,.02) 0%, transparent 70%);
}

/* Placeholder content label */
.main-hint {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:.5rem;
  color:var(--text-faint); font-size:.5rem; letter-spacing:.2em; text-transform:uppercase;
  pointer-events:none; user-select:none;
}

.main-hint-line { opacity:.5; }
.main-hint-line.accent { color:var(--text-dim); opacity:.8; }

/* ── AMBASSADOR TABS ── */
/*
  Chaque tab est une boîte fixée au bord droit.
  right: -1px → le bord droit affleure la fenêtre.
  On hover → translate vers la gauche pour révéler le label.
  L'icône "dépasse" car le tab a un padding-left qui la pousse hors du bord.
*/

.amb-stack {
  position:fixed;
  right:0;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:6px;
  z-index:500;
}

.amb-tab {
  position:relative;
  /* clip-path avec encoche gauche — cohérent avec le style Core Nexus */
  clip-path:polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px);
  width:42px;         /* largeur totale visible */
  height:42px;
  background:var(--surface);
  border:1px solid var(--border-hi);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  /* Le tab déborde de 2px à droite, l'icône "dépasse" */
  transform:translateX(2px);
  transition:
    transform .25s cubic-bezier(.4,0,.2,1),
    border-color .25s ease,
    box-shadow .25s ease,
    width .25s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
  white-space:nowrap;
}

/* Hover : glisse vers la gauche et s'élargit pour montrer le label */
.amb-tab:hover {
  transform:translateX(-4px);
  width:124px;
  justify-content:flex-start;
  padding-left:10px;
  gap:8px;
}

/* Status colors */
.amb-tab[data-status="connected"] {
  border-color:rgba(0,230,118,.35);
  box-shadow: 2px 0 12px rgba(0,230,118,.12);
}
.amb-tab[data-status="connected"]:hover {
  border-color:rgba(0,230,118,.6);
  box-shadow: 2px 0 20px rgba(0,230,118,.2);
}

.amb-tab[data-status="error"] {
  border-color:rgba(255,32,85,.35);
  box-shadow: 2px 0 12px rgba(255,32,85,.12);
}
.amb-tab[data-status="error"]:hover {
  border-color:rgba(255,32,85,.6);
  box-shadow: 2px 0 20px rgba(255,32,85,.2);
}

.amb-tab[data-status="disconnected"] {
  border-color:var(--border-hi);
  box-shadow: none;
}
.amb-tab[data-status="disconnected"]:hover {
  border-color:#2a3a5a;
  box-shadow: 2px 0 8px rgba(0,0,0,.3);
}

/* Icône */
.amb-icon {
  width:20px; height:20px;
  flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:opacity .2s;
}

.amb-icon svg { width:18px; height:18px; }

.amb-tab[data-status="disconnected"] .amb-icon { opacity:.3; }

/* Pulse sur l'icône en cas d'erreur */
.amb-tab[data-status="error"] .amb-icon {
  animation:icon-err 2s ease-in-out infinite;
}
@keyframes icon-err {
  0%,100% { opacity:1; }
  50%      { opacity:.4; }
}

/* Label (visible au hover) */
.amb-label {
  display:flex; flex-direction:column; gap:1px;
  opacity:0;
  transform:translateX(4px);
  transition:opacity .2s ease .05s, transform .2s ease .05s;
  overflow:hidden;
  flex:1;
}

.amb-tab:hover .amb-label {
  opacity:1;
  transform:translateX(0);
}

.amb-label-name {
  font-size:.52rem; letter-spacing:.1em;
  color:var(--text);
}

.amb-label-status {
  font-size:.44rem; letter-spacing:.08em;
}

[data-status="connected"]    .amb-label-status { color:var(--connected); }
[data-status="error"]        .amb-label-status { color:var(--error); }
[data-status="disconnected"] .amb-label-status { color:var(--text-faint); }

/* Coin encoche accent */
.amb-tab::after {
  content:'';
  position:absolute; top:0; left:0;
  width:10px; height:10px;
  background:var(--surface-2);
  clip-path:polygon(0 0, 0 100%, 100% 0);
  pointer-events:none;
}

/* Status dot (coin bas-gauche) */
.amb-dot {
  position:absolute; bottom:5px; right:5px;
  width:4px; height:4px; border-radius:50%;
  transition:opacity .2s;
}

.amb-tab:hover .amb-dot { opacity:0; }

[data-status="connected"]    .amb-dot { background:var(--connected); box-shadow:0 0 4px var(--connected); animation:pulse-dot 2s ease-in-out infinite; }
[data-status="error"]        .amb-dot { background:var(--error); box-shadow:0 0 4px var(--error); animation:pulse-dot 1s ease-in-out infinite; }
[data-status="disconnected"] .amb-dot { background:var(--text-faint); }

/* ── KEYFRAMES ── */
@keyframes spin-cw  { to { transform:rotate(360deg); } }
@keyframes spin-ccw { to { transform:rotate(-360deg); } }
@keyframes pulse-dot { 0%,100%{opacity:.9;transform:scale(1)} 50%{opacity:.35;transform:scale(.7)} }
</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<header class="topbar">
  <div class="brand-orb">
    <div class="r r1"></div><div class="r r2"></div><div class="core"></div>
  </div>
  <div class="top-title">Core Nexus</div>
  <div class="top-sep"></div>
  <div class="top-tag">Dashboard</div>

  <div class="top-right">
    <div class="top-stat"><div class="top-dot"></div><span>Nœud ∞ — En ligne</span></div>
    <div class="top-stat" style="color:var(--text-faint)" id="top-clock">--:--:--</div>
  </div>
</header>

<!-- MAIN -->
<div class="main">
  <div class="main-hint">
    <div class="main-hint-line">Contenu principal de l'application</div>
    <div class="main-hint-line accent">↗ Ambassadeurs en attente à droite</div>
  </div>
</div>

</div><!-- /app -->

<!-- AMBASSADOR TABS — fixed right edge -->
<div class="amb-stack">

  <!-- GitHub — connecté -->

      </svg>
    </div>
    <div class="amb-label">
      <span class="amb-label-name">GitHub</span>
      <span class="amb-label-status">Connecté</span>
    </div>
    <div class="amb-dot"></div>
  </div>

  <!-- GitLab — erreur -->
  <div class="amb-tab" data-status="error" title="GitLab">
    <div class="amb-icon">
      <svg viewBox="0 0 24 24" fill="#fc6d26">
        <path d="M22.65 14.39L12 22.13 1.35 14.39a.84.84 0 01-.3-.94l1.22-3.78 2.44-7.51A.42.42 0 014.82 2a.43.43 0 01.58 0 .42.42 0 01.11.18l2.44 7.49h8.1l2.44-7.51A.42.42 0 0118.6 2a.43.43 0 01.58 0 .42.42 0 01.11.18l2.44 7.51L23 13.45a.84.84 0 01-.35.94z"/>
      </svg>
    </div>
    <div class="amb-label">
      <span class="amb-label-name">GitLab</span>
      <span class="amb-label-status">Erreur 401</span>
    </div>
    <div class="amb-dot"></div>
  </div>

  <!-- AWS — déconnecté -->
  <div class="amb-tab" data-status="disconnected" title="AWS">
    <div class="amb-icon">
      <svg viewBox="0 0 24 24" fill="#ff9900">

      </svg>
    </div>
    <div class="amb-label">
      <span class="amb-label-name">AWS</span>
      <span class="amb-label-status">Déconnecté</span>
    </div>
    <div class="amb-dot"></div>
  </div>

</div><!-- /amb-stack -->

<script>
/* Horloge */
function tick() {
  const now = new Date();
  const p = v => String(v).padStart(2,'0');
  document.getElementById('top-clock').textContent = `${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
}
tick(); setInterval(tick, 1000);
</script>
</body>
</html>
